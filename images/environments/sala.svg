<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
      <defs>
        <linearGradient id="room1wall" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#f0e8d8"/>
          <stop offset="100%" style="stop-color:#e0d4c0"/>
        </linearGradient>
        <linearGradient id="room1floor" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#8B6338"/>
          <stop offset="100%" style="stop-color:#6B4A20"/>
        </linearGradient>
      </defs>
      <!-- Wall -->
      <rect width="800" height="500" fill="url(#room1wall)"/>
      <!-- Floor -->
      <rect x="0" y="350" width="800" height="150" fill="url(#room1floor)"/>
      <!-- Floor perspective lines -->
      <line x1="0" y1="350" x2="800" y2="350" stroke="#6B4A20" stroke-width="2"/>
      <line x1="0" y1="380" x2="800" y2="380" stroke="#6B4A20" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="410" x2="800" y2="410" stroke="#6B4A20" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="440" x2="800" y2="440" stroke="#6B4A20" stroke-width="0.5" opacity="0.4"/>
      <!-- Sofa left -->
      <rect x="20" y="300" width="200" height="55" rx="5" fill="#8B7355"/>
      <rect x="20" y="285" width="200" height="22" rx="5" fill="#9B8365"/>
      <rect x="20" y="285" width="20" height="70" rx="3" fill="#9B8365"/>
      <rect x="200" y="285" width="20" height="70" rx="3" fill="#9B8365"/>
      <!-- Sofa cushions -->
      <rect x="45" y="295" width="55" height="40" rx="8" fill="#a09278"/>
      <rect x="110" y="295" width="55" height="40" rx="8" fill="#a09278"/>
      <!-- Side table -->
      <rect x="230" y="315" width="40" height="40" rx="2" fill="#6B4A20"/>
      <circle cx="250" cy="308" r="12" fill="#d4af80" opacity="0.8"/>
      <!-- Plant -->
      <rect x="700" y="290" width="25" height="60" rx="3" fill="#5a3d1a"/>
      <ellipse cx="712" cy="285" rx="30" ry="35" fill="#2d6b1f"/>
      <ellipse cx="695" cy="295" rx="20" ry="25" fill="#3a8026"/>
      <ellipse cx="730" cy="298" rx="18" ry="22" fill="#2d6b1f"/>
      <!-- Lamp right -->
      <rect x="755" y="260" width="6" height="90" fill="#8B6338"/>
      <path d="M730,258 L782,258 L770,220 L742,220 Z" fill="#f5e6c8" stroke="#d4af80" stroke-width="1"/>
      <!-- Wainscot -->
      <rect x="0" y="0" width="800" height="8" fill="#d4c4a8"/>
      <rect x="0" y="330" width="800" height="8" fill="#d4c4a8"/>
    </svg>