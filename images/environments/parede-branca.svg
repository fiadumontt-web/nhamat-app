<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
      <defs>
        <linearGradient id="wall1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#f8f8f6"/>
          <stop offset="100%" style="stop-color:#eeeceb"/>
        </linearGradient>
      </defs>
      <rect width="800" height="500" fill="url(#wall1)"/>
      <!-- Subtle texture lines -->
      <line x1="0" y1="250" x2="800" y2="250" stroke="#e0dedd" stroke-width="0.5"/>
      <!-- Floor -->
      <rect x="0" y="420" width="800" height="80" fill="#d4cfc9"/>
      <line x1="0" y1="420" x2="800" y2="420" stroke="#b8b0a8" stroke-width="2"/>
      <!-- Shadow -->
      <rect x="0" y="415" width="800" height="10" fill="url(#shadow1)" opacity="0.3"/>
    </svg>