<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
      <defs>
        <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#0a0520"/>
          <stop offset="40%" style="stop-color:#4a1060"/>
          <stop offset="70%" style="stop-color:#c44d1a"/>
          <stop offset="100%" style="stop-color:#e8851a"/>
        </linearGradient>
        <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#c44d1a;stop-opacity:0.8"/>
          <stop offset="100%" style="stop-color:#0a1a3a"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="300" height="400" fill="#2a1500"/>
      <rect x="12" y="12" width="276" height="376" fill="#1a0e00"/>
      <rect x="20" y="20" width="260" height="360" fill="url(#sky)"/>
      <rect x="20" y="230" width="260" height="150" fill="url(#sea)"/>
      <!-- Sun -->
      <circle cx="150" cy="230" r="35" fill="#E8B020" opacity="0.95"/>
      <!-- Sun reflection -->
      <path d="M135,230 L150,380 L165,230 Z" fill="#E8B020" opacity="0.2"/>
      <!-- Horizon line -->
      <line x1="20" y1="230" x2="280" y2="230" stroke="#E8B020" stroke-width="0.5" opacity="0.4"/>
      <rect x="20" y="20" width="260" height="360" fill="none" stroke="#C9930A" stroke-width="2" opacity="0.5"/>
    </svg>